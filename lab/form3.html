<!DOCTYPE html>
<html>
<head>
    <title>Create your account</title>
</head>
<body>

<h1>Create your account</h1>
    <p>join us in a couple of steps</p>    

<div class="container">

    <div class="header">
        <div class="title">Create your account</div>
    </div>

    <div class="content">
        <label>Full name</label>
        <input type="text" placeholder="Jane Doe">
    </div>

    <div class="content">
        <label>Age</label>
        <input type="number" placeholder="10001">
    </div>

    <div class="content">
        <label>Date of birth</label>
        <input type="date" placeholder="25/06/2026">
    </div>

    <div class="content">
        <label>Work email</label>
        <input type="email" placeholder="jane@company.com">
    </div>

    <div class="content">
        <label>Password</label>
        <input type="password" placeholder="........">
    </div>


    <div class="content">
     <label>Preferred contact</label> 
        <input type="radio" name="Preferred contact"> Email
        <input type="radio" name="Preferred contact"> Phone
        <input type="radio" name="Preferred contact"> Sms
     
    </div>

  <div class="content">
    <button type="submit" class="btn btn-primary">Submit</button>
    <button type="reset"  class="btn btn-secondary">Reset</button>
</div>
    

</div>

</body>
</html>
